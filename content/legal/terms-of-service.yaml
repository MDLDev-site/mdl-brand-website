intro: "THIS MAIN SERVICES AGREEMENT GOVERNS THE USE OF THE MATCHDAY LIVE SERVICES. CAPITALIZED TERMS HAVE THE MEANINGS GIVEN IN SECTION 1 OF THIS AGREEMENT.\n\nBY ACCEPTING THIS AGREEMENT, BY (1) CLICKING A BOX INDICATING ACCEPTANCE, (2) AGREEING TO A PROPOSAL OR ORDER FORM REFERENCING THIS AGREEMENT, OR (3) USING THE SERVICES, YOU AGREE TO BE BOUND BY ITS TERMS."

sections:
  - heading: "1. Definitions and Interpretation"
    body: |
      ### 1.1 Definitions

      In this Agreement, unless the context otherwise requires:

      - **Agreement** means this agreement including the attached schedules.
      - **Party** means a party to this Agreement from time to time, and **Parties** means all of them.
      - **Business Day** means a day on which banks in England are open for general banking business, excluding Saturdays, Sundays and public holidays.
      - **Business Hour(s)** means 9am to 5pm BST on a Business Day.
      - **Personnel** means in relation to a Party, any employee, contractor, officer and agent of that Party.
      - **Service Provider** means Matchday Media Group Limited.
      - **Customer** refers to any individual, company, or legal entity that registers for an account on the Application with the Service Provider, whether directly or through an authorised representative. This includes any employees, agents, or third parties acting on behalf of the Customer.
      - **Related Entities** means a separate legal entity directly or indirectly connected to the Customer through ownership, control or affiliation.
      - **Authorised User(s)** means authorised user(s) of the Customer.
      - **Viewer** means an end-user of the Customer, who engages with the Application as part of the service offered by the Customer.
      - **Site** means the web application found at https://www.matchday.live.
      - **Software** means the software used to provide the Services, and includes any instructions in hard copy or electronic form and any update, modification or release of any part of that software after this agreement is entered into by the Parties.
      - **System(s)** means a combination of Products or a combination of Products and Services which are integrated and operate together, including a network.
      - **Documentation** means any documentation, hard copy or digital, provided to the Customer by the Service Provider, intended for guidance on use of the Products and Services.

