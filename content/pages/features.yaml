page:
  title: "Live Streaming Features — Sports OTT Platform | MatchDayLive"
  description: "DRM, global CDN, fan analytics, Stripe payments, and Smart TV support — everything sports organisations need to run a professional OTT platform."

hero:
  heading:
    - EVERYTHING YOU NEED
    - TO STREAM LIKE A PRO
  description: "From your first live stream to a global OTT rollout. MatchdayLive gives you the control, flexibility, and power to build your own broadcasting empire."

anchors:
  - id: platform
    label: Platform
  - id: brandability
    label: Brandability
  - id: monetisation
    label: Monetisation
  - id: insights
    label: Insights
  - id: fan-experience
    label: Fan Experience
  - id: scalability
    label: Scalability
  - id: security
    label: Security

categories:
  - id: platform
    # DEV-2308/2309 — heading + paragraph + features per Figma 164-8119
    heading: "ALL-IN-ONE"
    description: "Run your live and on-demand media broadcast with ease, all from within the same platform."
    background: white
    hideHeading: false
    features:
      - title: "Multi-Team"
        description: "Operate a multi-team channel (i.e. men's, women's, juniors) and ensure cross-pollination of fans from one division/league to the next and club-wide exposure."
      - title: "Concurrent Streaming"
        description: "Run multiple live streams on a single channel simultaneously. Deliver more content, cover multiple events, and give fans the freedom to choose what they watch."
      - title: "Step-by-Step Stream Setups"
        description: "Launch live streams effortlessly with our intuitive stream setup wizard, guiding you through every step of the process and ensuring all technical and quality considerations are covered, for a flawless broadcast."
      - title: "Globally Accepted Ingest Formats"
        description: "Accept streams in all major formats, including HLS, SRT, and RTMP."
        checks:
          - HLS
          - SRT
          - RTMP
      - title: "Transaction Management"
        description: "A transaction management suite from which to view and manage live transactions, process full or partial refunds and more."
      - title: "Media Management and Syndication"
        description: "Centralise, organise and enrich all audio and video content. Stored in both raw and encoded formats, media is easy to search, access, share and embed (single domain only) — whether for fans, internal teams, or syndication partners."
        checks:
          - Curate
          - Download
          - Share
          - Embed
      - title: "Customer Payouts"
        description: "MatchdayLive handles all fee payments on your behalf, managing taxes, refunds, and disputes. Receive clear monthly payouts and reports that reflect your net revenue — simplifying finance and letting you focus on growing your fan base."
      - title: "Self-Billed Invoicing"
        description: "Access and incorporate self-billed invoices, simplify the responsibility on your finance team, while allowing you to keep your books accurate and up to date."
      - title: "Usage Monitoring and Notifications"
        description: "Know your channel consumption across bandwidth, storage and live stream hours (if applicable) at all times and get notified in real-time when you near your plan limits."

  - id: brandability
    heading: "YOUR OWN BRANDED OTT"
    description: "Take full ownership of your Live & On-Demand content, branded and on your domain."
    background: white
    features:
      - title: "Your Brand"
        description: "Seamlessly apply your brand identity across all touch-points."
      - title: "On Your Domain"
        description: "Make your fans feel right at home via access on your domain (e.g. fantv.yourdomain.com)"
      - title: "Sponsor Involvement"
        description: "Retain brand partnerships with opportunities to highlight key sponsors."
      - title: "Statement Lines"
        description: "Ensure fans are never in the dark about transactions by customising bank statement descriptions to identify your channel."
      - title: "Drag & Drop Channel Builder"
        description: "Maximise engagement and monetisation opportunities through the strategic positioning of Playlists and Collections."
        checks:
          - Create
          - Manage
          - Optimise

  - id: monetisation
    heading: "TURN PASSION INTO PROFIT"
    description: "Leverage your content to expand existing and explore new monetisation opportunities."
    background: grey
    features:
      - title: "Plans"
        description: "Create bespoke automatically **recurring** plans to ensure steady annuity income. Alternatively make use of **one-off** plans to create fixed term access for a bouquet of content."
        checks:
          - Recurring or One-off
          - "Monthly, Annual, Seasonal"
          - Customisable to content types
      - title: "Pay Per View (PPV)"
        description: "Pay Per View (PPV) pricing allows one-off, low commitment pricing."
        checks:
          - Suits price sensitive fans
          - "Ad-Hoc fans (e.g. Away fans)"
          - 'Encourages "try before you buy"'
      - title: "Free & Freemium"
        description: "Organically grow your fanbase by offering **Free** & **Freemium** content.\n\n**Freemium** pricing, which requires a fan to create and account and sign-in, allows access to demographic and behavioural insights & offers access to communicate with your fans."
        checks:
          - Generate insights
          - Grow your fanbase
      - title: "Stripe Facilitated Payments"
        description: "Accept payments using a trusted and globally recognised, PCI DSS compliant payment gateway.\n\n- No Stripe Account Required\n- Accept Local and International Cards\n- VISA, Mastercard, Amex, Apple Pay, Google Pay, Link and more\n- Locally trusted payment options"
      - title: "Managed VAT & Sales Taxes"
        description: "Avoid countless hours managing global VAT and Sales Tax obligations."
        checks:
          - Tax calculated at checkout
          - Manage filing and remittance
          - Global tax compliance
      - title: "Promotions"
        description: "Incentivise fan purchases through promotions on both **Plans** and **Pay-Per-View** pricing models."
        checks:
          - Regional
          - Value or % based
          - Time limited
          - Bundled
      - title: "User Groups"
        description: "Build bespoke audiences from invited and registered fans and assign access limitations to suit group requirements."

  - id: insights
    # DEV-2311/2312 — heading + paragraph + features per Figma 164-7994
    heading: "UNDERSTAND FANS LIKE NEVER BEFORE"
    description: "Real-time engagement insights and revenue breakdowns ensure better strategic decision making."
    background: white
    features:
      - title: "Commercial Insights"
        description: "Track every dollar earned across both Live & On-Demand content, providing deeper insights on fan purchasing behaviour.\n\nOptimise content planning and creation to increase earnings.\n\nSegment earnings by time of day, day of week, media types, content categories and more."
      - title: "Engagement Insights"
        description: "Unlock powerful real-time engagement insights to better understand your fans' interest and behaviour, as well as optimise your content."
      - title: "Transaction Exports"
        description: "Export your raw transaction data in clearly defined reports for internal analysis and reporting, commission calculations, audits and more."
      - title: "3rd Party Analytics Integrations"
        description: "Seamlessly integrate with third-party analytics tools to unify data, deepen insights, and enhance performance tracking."

  - id: fan-experience
    # DEV-2314/2315 — heading + paragraph + features per Figma 164-8010
    heading: "PUTTING FANS FIRST"
    description: "Putting your fans first with SSO integrations, 24/7 support and in-app notifications."
    background: grey
    features:
      - title: "Live Streamed Video"
        description: "Deliver every moment in real time with low-latency, smooth-quality streams that scale effortlessly. Giving fans the immersive live experience they have come to expect."
      - title: "Live Streamed Audio"
        description: "Offer fans the freedom to tune in anywhere with high-quality live audio streams. Perfect for supporters who prefer to listen. It provides an accessible, cost-friendly way to stay connected to every fixture and moment."
      - title: "Instant On-Demand"
        description: "Ensure live streamed replays are available to fans instantly after the live broadcast terminates, ensuring fans never miss the action. Need to uphold rights agreements with delayed availability? No problem."
      - title: "On-Demand"
        description: "Create a centralised home for your fans to easily access all of your on-demand media."
        checks:
          - Enrich and curate with automated thumbnail selection, categories, tags, links to teams and leagues and more
          - Select Playlists and Collections
      - title: "Smart Playlists"
        description: "Create smart automated playlists using content inclusion rules, to organise your media, keeping it up-to-date and engaging."
      - title: "Collections"
        description: "Use Collections to create and showcase multiple playlists in one place, giving fans seamless access to a rich, personalised content library."
      - title: "Optimised for Mobile"
        description: "Deliver a seamless viewing and listening experience on any device. MatchdayLive is built mobile-first, ensuring fans enjoy high-quality streams and on-demand content wherever they are."
      - title: "Best in Class Player"
        description: "Give fans complete control with a powerful, intuitive video player. Features like picture-in-picture, casting, adaptive bitrate, and instant scrubbing ensure smooth, flexible viewing without interruptions."
        checks:
          - HD Quality (1080p)
          - Adaptive Bitrate
          - Picture-in-Picture Mode
      - title: "SmartTV Casting"
        description: "Allow fans to cast from their desktops, laptops, tablets & mobile phones to SmartTVs and other smart devices."
        checks:
          - Apple AirPlay Compatible
          - Chromecast Compatible
      - title: "3rd Party Single Sign-On (SSO) Integrations"
        description: "Seamlessly connect with leading SSO partners, allowing fans to log in using accounts that they already know and trust. No extra sign-ups, no new passwords — simply frictionless access."
      - title: "In-Player and In-App Push Notifications"
        description: "Keep fans informed in real time with instant push notifications during live streams. Quickly share updates or close alerts, reducing support queries and protecting your brand reputation."
      - title: "Real-Time Fan Support"
        description: "Provide fans with 24/7 in-app support, instantly resolving common queries via an intelligent knowledge base. When needed, embedded live support connects fans to your first responder, with seamless escalation to MatchdayLive Fan Support for more involved issues."

  - id: scalability
    # DEV-2317/2318 — heading + paragraph + features per Figma 164-8082
    heading: "HANDLE THE BIGGEST OCCASIONS"
    description: "Developed on best-in-class AWS infrastructure, ensuring reliability and scalability."
    background: white
    features:
      - title: "Scale Infinitely"
        description: "Built on enterprise-grade infrastructure, **MatchdayLive** grows effortlessly with your audience. From local matches to global tournaments, deliver a flawless experience without compromising speed, stability, or quality."
      - title: "Global Content Delivery"
        description: "Seamless access anywhere in the world. Our CDN-powered infrastructure delivers content from the closest servers to where your fan is based, ensuring fast, reliable, and high-quality playback every time."
      - title: "No Size Restrictions"
        description: "Grow without limits. Whether you have hundreds or millions of fans, our platform supports any audience size while maintaining a top-quality experience."
      - title: "Encoder Compatibility"
        description: "Work with the encoders you already use. **MatchdayLive** supports both hardware and software encoders, ingesting streams in widely used formats for flexible, reliable broadcasting."

  - id: security
    # DEV-2320/2321 — heading + paragraph + features per Figma 164-8097
    heading: "Secure, Compliant and In Control"
    description: "Protect your channel with enterprise-grade security across payments, media rights and data."
    background: grey
    features:
      - title: "Secure Payments"
        description: "Enjoy seamless and secure transaction processing through a globally recognised and industry-leading PCI DSS-compliant payment platform, Stripe."
      - title: "Digital Rights Management (DRM)"
        description: "Protect your content with built-in DRM and geographic restrictions. Ensure rights agreements are upheld while controlling where and how your media can be accessed."
      - title: "Private Content Access"
        description: "Create private live streams or on-demand content, with visibility of the media limited to only those with assigned access."
        checks:
          - Media Briefings
          - Awards Ceremonies
          - Team Announcements
          - Limited Access Events
      - title: "Configurable Stream Limits"
        description: "Set your own rules for concurrent live fans per viewer account. Control access, protect your revenue and ensure a fair commercial experience for your fans."
      - title: "Data Ownership"
        description: "Retain full ownership of your fan data, with complete access and control. Use it to drive insights and engagement, all while staying fully compliant with GDPR and privacy regulations."
      - title: "User Management and Roles"
        description: "Assign internal or external (e.g. production partners) team members precise access levels to protect critical functions while enabling collaboration."
      - title: "GDPR Compliance and Data Privacy"
        description: "Built with privacy at its core, **MatchdayLive** ensures all fan data is handled in full compliance with GDPR. Analytics and reporting are designed to ensure maximum insight while meeting regulatory obligations."
