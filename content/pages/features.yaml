page:
  title: "Live Streaming Features — Sports OTT Platform | MatchDayLive"
  description: "DRM, global CDN, fan analytics, Stripe payments, and Smart TV support — everything sports organisations need to run a professional OTT platform."

hero:
  heading:
    - EVERYTHING YOU NEED
    - TO STREAM LIKE A PRO
  description: "From your first live stream to a global OTT rollout. MatchdayLive gives you the control, flexibility, and power to build your own broadcasting empire."

anchors:
  - id: platform
    label: Platform
  - id: brandability
    label: Brandability
  - id: monetisation
    label: Monetisation
  - id: insights
    label: Insights
  - id: fan-experience
    label: Fan Experience
  - id: scalability
    label: Scalability
  - id: security
    label: Security

categories:
  - id: platform
    # DEV-2309 — heading + paragraph per Natalia's screenshot
    heading: "ALL-IN-ONE"
    description: "Run your live and on-demand media broadcast with ease, all from within the same platform."
    background: white
    hideHeading: false
    features:
      - title: "Content Management"
        description: "Upload, organise and schedule your entire content library from a single, intuitive dashboard. Publish instantly or plan ahead with scheduled releases."
      - title: "Adaptive Web Player"
        description: "A responsive web player that delivers smooth 1080p HD playback on desktop and mobile browsers — automatically selecting the best quality for each fan's connection."
      - title: "Chromecast & AirPlay"
        description: "Fans can cast Live & On-Demand content directly from the web player to their TV via Chromecast or AirPlay — no app download required."
        checks:
          - Google Chromecast
          - Apple AirPlay
          - Cast from any browser
      - title: "Channel Builder"
        description: "Design your channel homepage with a drag-and-drop builder. Curate playlists, highlight live events, and strategically promote featured content."

  - id: brandability
    heading: "YOUR OWN BRANDED OTT"
    description: "Take full ownership of your Live & On-Demand content, branded and on your domain."
    background: white
    features:
      - title: "Your Brand"
        description: "Seamlessly apply your brand identity across all touch-points."
      - title: "On Your Domain"
        description: "Make your fans feel right at home via access on your domain (e.g. fantv.yourdomain.com)"
      - title: "Sponsor Involvement"
        description: "Retain brand partnerships with opportunities to highlight key sponsors."
      - title: "Statement Lines"
        description: "Ensure fans are never in the dark about transactions by customising bank statement descriptions to identify your channel."
      - title: "Drag & Drop Channel Builder"
        description: "Maximise engagement and monetisation opportunities through the strategic positioning of Playlists and Collections."
        checks:
          - Create
          - Manage
          - Optimise

  - id: monetisation
    heading: "TURN PASSION INTO PROFIT"
    description: "Leverage your content to expand existing and explore new monetisation opportunities."
    background: grey
    features:
      - title: "Plans"
        description: "Create bespoke automatically **recurring** plans to ensure steady annuity income. Alternatively make use of **one-off** plans to create fixed term access for a bouquet of content."
        checks:
          - Recurring or One-off
          - "Monthly, Annual, Seasonal"
          - Customisable to content types
      - title: "Pay Per View (PPV)"
        description: "Pay Per View (PPV) pricing allows one-off, low commitment pricing."
        checks:
          - Suits price sensitive fans
          - "Ad-Hoc fans (e.g. Away fans)"
          - 'Encourages "try before you buy"'
      - title: "Free & Freemium"
        description: "Organically grow your fanbase by offering **Free** & **Freemium** content.\n\n**Freemium** pricing, which requires a fan to create and account and sign-in, allows access to demographic and behavioural insights & offers access to communicate with your fans."
        checks:
          - Generate insights
          - Grow your fanbase
      - title: "Stripe Facilitated Payments"
        description: "Accept payments using a trusted and globally recognised, PCI DSS compliant payment gateway.\n\n- No Stripe Account Required\n- Accept Local and International Cards\n- VISA, Mastercard, Amex, Apple Pay, Google Pay, Link and more\n- Locally trusted payment options"
      - title: "Managed VAT & Sales Taxes"
        description: "Avoid countless hours managing global VAT and Sales Tax obligations."
        checks:
          - Tax calculated at checkout
          - Manage filing and remittance
          - Global tax compliance
      - title: "Promotions"
        description: "Incentivise fan purchases through promotions on both **Plans** and **Pay-Per-View** pricing models."
        checks:
          - Regional
          - Value or % based
          - Time limited
          - Bundled
      - title: "User Groups"
        description: "Build bespoke audiences from invited and registered fans and assign access limitations to suit group requirements."

  - id: insights
    heading: "UNDERSTAND FANS LIKE NEVER BEFORE"
    description: "Unlock fresh insights and opportunities — ensuring your fans are at the heart of every move."
    background: white
    features:
      - title: "Audience Analytics"
        description: "Understand who your fans are, where they're watching from, and which content keeps them coming back — with real-time and historical reporting."
      - title: "Revenue Dashboards"
        description: "Track subscriptions, PPV sales and promotional performance in one place. Identify your highest-value content and act on it immediately."
      - title: "Content Performance"
        description: "See exactly how each piece of content performs — views, watch time, completion rate and engagement trends over any time period."
      - title: "Fan Behaviour"
        description: "Understand how fans navigate your channel: what they search for, where they drop off, and what drives conversions to paid tiers."
      - title: "Custom Reports & API Access"
        description: "Export data and connect to your existing business intelligence tools via REST API. Available on Scale and Unlimited plans."
        checks:
          - Data export (CSV)
          - REST API access
          - Custom report builder

  - id: fan-experience
    # DEV-2314 — paragraph updated per Natalia
    heading: "PUTTING FANS FIRST"
    description: "Putting your fans first with SSO integrations, 24/7 support and in-app notifications."
    background: grey
    features:
      - title: "1080p HD Streaming"
        description: "Every stream delivered in crisp 1080p HD with HLS adaptive bitrate streaming — automatically adjusting quality to each fan's connection speed."
      - title: "Low-Latency Live"
        description: "Live action with virtually no delay. Fans stay ahead of the game with our low-latency streams, keeping second-screen experiences perfectly in sync."
      - title: "Chromecast & AirPlay"
        description: "Cast Live & On-Demand content directly from the web player to a TV via Chromecast or AirPlay — no additional app required."
      - title: "Fan Support"
        description: "Real-time fan support via Intercom chat — helping your fans with login issues, payment queries and playback problems, with straightforward escalation to your support team."

  - id: scalability
    # DEV-2317 — paragraph updated per Natalia
    heading: "HANDLE THE BIGGEST OCCASIONS"
    description: "Developed on best-in-class AWS infrastructure, ensuring reliability and scalability."
    background: white
    features:
      - title: "Auto-Scaling Delivery"
        description: "AWS-powered infrastructure automatically scales to handle any audience size — whether it's a regular league fixture or a sold-out cup final."
      - title: "99.9% Uptime SLA"
        description: "Your channel is always on. Enterprise-grade redundancy and 24/7 monitoring ensure fans can always access your content."
      - title: "Global CDN"
        description: "Content is delivered from edge locations worldwide, ensuring fast load times and reliable streaming wherever your fans are watching."
      - title: "Multi-Region Failover"
        description: "Automatic traffic rerouting in the event of regional outages keeps your streams live without interruption. Available on Scale and Unlimited plans."
      - title: "No Throttling"
        description: "We never throttle your streams mid-event. If you are approaching your bandwidth limit, we alert you proactively and can upgrade your plan instantly."

  - id: security
    # DEV-2320 — heading + paragraph updated per Natalia
    heading: "Secure, Compliant and In Control"
    description: "Protect your channel with enterprise-grade security across payments, media rights and data."
    background: grey
    features:
      - title: "Geographic Content Controls"
        description: "Restrict access to your content by country — essential for enforcing territorial broadcast rights and honouring licensing agreements with rights holders."
        checks:
          - Country-level access control
          - Configurable per stream or event
          - Admin-managed via the dashboard
      - title: "GDPR-Compliant Data Handling"
        description: "Fan data is stored securely and processed in full compliance with GDPR. You retain ownership and control of your audience data at all times."
      - title: "Secure Payments"
        description: "All card transactions are handled exclusively by Stripe, a PCI DSS Level 1 certified provider. Your fans' payment data never touches our servers."
        checks:
          - PCI DSS Level 1 via Stripe
          - Stripe Radar fraud detection
          - Secure payment tokenisation
      - title: "Sports Alliance SSO"
        description: "Fans can sign in using their Sports Alliance account, removing friction and letting them access your channel with credentials they already have."
      - title: "Encrypted Delivery"
        description: "All content is delivered over HTTPS via Amazon CloudFront, ensuring encrypted transmission between our infrastructure and your fans."
